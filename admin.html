<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌游店软装 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f0f0f0;
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .product-price {
            color: #e74c3c;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-stock {
            color: #666;
            font-size: 0.9em;
        }

        .stock-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .stock-controls input {
            flex: 1;
        }

        .stock-controls button {
            padding: 8px 15px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 桌游店软装管理后台</h1>

        <div class="tabs">
            <button class="tab active" onclick="showTab('categories')">分类管理</button>
            <button class="tab" onclick="showTab('products')">商品管理</button>
            <button class="tab" onclick="showTab('add-product')">新增商品</button>
        </div>

        <div id="alert-container"></div>

        <!-- 分类管理 -->
        <div id="categories" class="tab-content active">
            <h2>📁 商品分类</h2>
            <div class="form-group">
                <label>新增分类</label>
                <input type="text" id="newCategoryName" placeholder="例如：桌椅、装饰、照明">
            </div>
            <button class="btn" onclick="addCategory()">新增分类</button>
            <div id="categoriesList" style="margin-top: 20px;"></div>
        </div>

        <!-- 商品管理 -->
        <div id="products" class="tab-content">
            <h2>📦 商品列表</h2>
            <div id="productsList" class="products-grid"></div>
        </div>

        <!-- 新增商品 -->
        <div id="add-product" class="tab-content">
            <h2>➕ 新增商品</h2>
            <form id="productForm" onsubmit="addProduct(event)">
                <div class="form-group">
                    <label>商品分类 *</label>
                    <select id="productCategory" required>
                        <option value="">请选择分类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>商品名称 *</label>
                    <input type="text" id="productName" required placeholder="例如：北欧风餐桌">
                </div>
                <div class="form-group">
                    <label>商品描述</label>
                    <textarea id="productDescription" placeholder="商品的详细描述..."></textarea>
                </div>
                <div class="form-group">
                    <label>价格 (NT$) *</label>
                    <input type="number" id="productPrice" required min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>库存数量 *</label>
                    <input type="number" id="productStock" required min="0" value="0">
                </div>
                <div class="form-group">
                    <label>商品图片</label>
                    <input type="file" id="productImage" accept="image/*">
                </div>
                <button type="submit" class="btn">新增商品</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://postgres-production-8111.up.railway.app/api';

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'categories') {
                loadCategories();
            } else if (tabName === 'products') {
                loadProducts();
            } else if (tabName === 'add-product') {
                loadCategoriesForForm();
            }
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                
                const html = data.categories.map(cat => 
                    `<div style="padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px;">
                        📁 ${cat.name}
                    </div>`
                ).join('');
                
                document.getElementById('categoriesList').innerHTML = html || '<p>暂无分类</p>';
            } catch (error) {
                showAlert('加载分类失败：' + error.message, 'error');
            }
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            
            if (!name) {
                showAlert('请输入分类名称', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/categories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert('分类新增成功！');
                    document.getElementById('newCategoryName').value = '';
                    loadCategories();
                } else {
                    showAlert('新增失败：' + data.error, 'error');
                }
            } catch (error) {
                showAlert('新增失败：' + error.message, 'error');
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                
                const html = data.products.map(product => `
                    <div class="product-card">
                        ${product.image_url ? 
                            `<img src="${API_URL.replace('/api', '')}${product.image_url}" class="product-image">` :
                            '<div class="product-image"></div>'
                        }
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">NT$ ${product.price}</div>
                        <div class="product-stock">库存：${product.stock} 件</div>
                        <div class="stock-controls">
                            <input type="number" id="stock-${product.id}" value="${product.stock}" min="0">
                            <button class="btn" onclick="updateStock(${product.id})">更新</button>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('productsList').innerHTML = html || '<p>暂无商品</p>';
            } catch (error) {
                showAlert('加载商品失败：' + error.message, 'error');
            }
        }

        async function updateStock(productId) {
            const newStock = document.getElementById(`stock-${productId}`).value;
            
            try {
                const response = await fetch(`${API_URL}/products/${productId}/stock`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock: parseInt(newStock) })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert('库存更新成功！');
                } else {
                    showAlert('更新失败：' + data.error, 'error');
                }
            } catch (error) {
                showAlert('更新失败：' + error.message, 'error');
            }
        }

        async function loadCategoriesForForm() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                
                const select = document.getElementById('productCategory');
                select.innerHTML = '<option value="">请选择分类</option>' + 
                    data.categories.map(cat => 
                        `<option value="${cat.id}">${cat.name}</option>`
                    ).join('');
            } catch (error) {
                showAlert('加载分类失败：' + error.message, 'error');
            }
        }

        async function addProduct(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append('category_id', document.getElementById('productCategory').value);
            formData.append('name', document.getElementById('productName').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('stock', document.getElementById('productStock').value);
            
            const imageFile = document.getElementById('productImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert('商品新增成功！');
                    document.getElementById('productForm').reset();
                } else {
                    showAlert('新增失败：' + data.error, 'error');
                }
            } catch (error) {
                showAlert('新增失败：' + error.message, 'error');
            }
        }

        // 初始加载
        loadCategories();
    </script>
</body>
</html>
